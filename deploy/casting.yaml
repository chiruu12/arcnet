apiVersion: v1alpha1
kind: Installation
metadata:
  name: signoz
spec:
  deployment:
    flavor: compose
    mode: docker
  signoz:
    spec:
      image: signoz/signoz:v0.133.0
      env:
        SIGNOZ_USER_ROOT_ENABLED: "true"
        SIGNOZ_USER_ROOT_EMAIL: arcnet@example.com
        SIGNOZ_USER_ROOT_ORG_NAME: arcnet
